version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      cargo-patches:
        update-types: ["patch"]
      serde:
        patterns:
          - "serde"
          - "serde_*"
      clap:
        patterns:
          - "clap"
          - "clap_*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      docker-actions:
        patterns:
          - "docker/*"

  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
