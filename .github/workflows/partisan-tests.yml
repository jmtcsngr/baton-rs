name: "Partisan compatibility tests"

# Trigger budget: this workflow builds CPython from source on cold
# cache and runs partisan's full pytest suite, so we don't want it
# firing on every feature-branch push. Run on:
#   - any pull_request (gate before merge into main)
#   - push to main (post-merge validation)
#   - push to branches matching `**compat_partisan**` (opt-in name
#     for branches actively working on partisan-compat — push there
#     to iterate without opening a PR)
on:
  pull_request:
  push:
    branches:
      - main
      - "**compat_partisan**"

# End-to-end run of partisan's pytest suite against baton-rs binaries.
# Partisan is the primary downstream consumer of the baton-do wire
# envelope, so its tests are the most useful gate on wire-compat
# regressions.
#
# Why this workflow doesn't call the `_irods-test.yml` reusable
# workflow: partisan needs a Python 3.12 pyenv install cached across
# runs, which has no business in the unit-tests pipeline. We
# duplicate the ~15-line iRODS service-container block to keep the
# reusable workflow uncomplicated.
#
# Matrix runs partisan against 4.3.4 / 4.3.5. iRODS 4.2.7 is
# intentionally excluded: its build image is Ubuntu 16.04, whose
# stock OpenSSL is too old (1.0.2) for the Python 3.12 pyenv
# install partisan requires (`_ssl` extension needs OpenSSL ≥
# 1.1.1). `unit-tests.yml` still covers 4.2.7 directly — no
# Python involved on that path.
#
# The job is intentionally **informational long-term**
# (`continue-on-error: true`): partisan is a downstream consumer
# pinned to a single SHA, so its tests carry information about
# wire-compat regressions but shouldn't gate merges on the
# baton-rs side — schema drift, partisan-pin bumps, or upstream
# iRODS quirks would all surface here as "fails" the baton-rs
# author can't fix in their own PR. Treat the partisan job as a
# signal to investigate, not a merge blocker.
#
# Tracks #39 (Session 8), #57 (partisan recon).
jobs:
  test:
    name: "partisan / iRODS ${{ matrix.irods }}"
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          # iRODS 4.2.7 deliberately omitted — Ubuntu 16.04 base
          # image ships OpenSSL 1.0.2, which can't build the
          # Python 3.12 `_ssl` extension partisan needs. See the
          # header comment.
          - irods: "4.3.4"
            build_image: "ghcr.io/wtsi-npg/ub-22.04-irods-clients-dev-4.3.4:latest"
            server_image: "ghcr.io/wtsi-npg/ub-22.04-irods-4.3.4:latest"
          - irods: "4.3.5"
            build_image: "ghcr.io/wtsi-npg/ub-22.04-irods-clients-dev-4.3.5:latest"
            server_image: "ghcr.io/wtsi-npg/ub-22.04-irods-4.3.5:latest"

    services:
      irods-server:
        image: ${{ matrix.server_image }}
        ports:
          - "1247:1247"
          - "20000-20199:20000-20199"
        volumes:
          - /dev/shm:/dev/shm
        options: >-
          --health-cmd "nc -z -v localhost 1247"
          --health-start-period 60s
          --health-interval 10s
          --health-timeout 20s
          --health-retries 6

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      # Cache the pyenv tree plus the built Python interpreter so
      # subsequent runs skip the ~5 min source build. Key on the
      # script + pin file so any bump (Python version, pyenv release,
      # install logic) invalidates the cache automatically. Path is
      # workspace-relative because that's the directory the build
      # action mounts into the container.
      - name: "Cache pyenv install"
        uses: actions/cache@v5
        with:
          path: .pyenv-cache
          key: pyenv-${{ matrix.irods }}-${{ hashFiles('.github/scripts/test-partisan.sh', '.github/scripts/partisan-pin') }}
          restore-keys: |
            pyenv-${{ matrix.irods }}-

      - name: "Run partisan pytest"
        uses: wtsi-npg/build-irods-client-action@v1.1.1
        with:
          build-image: ${{ matrix.build_image }}
          build-script: .github/scripts/test-partisan.sh
          docker-network: ${{ job.services.irods-server.network }}

      - name: "Show test log"
        if: ${{ failure() }}
        run: find "$GITHUB_WORKSPACE" -name "*.log" -exec cat {} \;
