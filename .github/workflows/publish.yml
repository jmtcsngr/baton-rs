name: "Publish container"
on:
  push:
    tags:
      - "*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      - name: "Build release binaries"
        uses: wtsi-npg/build-irods-client-action@v1.1.1
        with:
          build-image: ghcr.io/wtsi-npg/ub-22.04-irods-clients-dev-4.3.5:latest
          build-script: docker/build-release.sh
          # docker-network omitted — defaults to "host", no iRODS server needed

      - name: "Log in to GHCR"
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Extract Docker metadata"
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          # `latest` is gated on non-prerelease tags: SemVer prerelease
          # versions always carry a hyphen (e.g. `1.0.0-alpha.0`) and
          # we don't want `:latest` pointing at an alpha or rc. The
          # semver patterns below produce `{{major}}.{{minor}}` only
          # for non-prerelease tags by default (action behaviour), so
          # an alpha emits only `:1.0.0-alpha.0` and nothing else.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: "Build and push"
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
